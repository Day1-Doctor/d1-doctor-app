name: Release — Build & Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.6.0). Leave empty to build without releasing.'
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  TAURI_DIR: crates/desktop/src-tauri
  FRONTEND_DIR: crates/desktop

jobs:
  build-macos:
    name: Build macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ env.TAURI_DIR }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ${{ env.FRONTEND_DIR }}
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Day1 Doctor {0}', github.ref_name) || inputs.tag && format('Day1 Doctor {0}', inputs.tag) || '' }}
          releaseBody: |
            See the [changelog](https://github.com/Day1-Doctor/d1-doctor-app/blob/main/CHANGELOG.md) for details.

            ## Install

            ### Desktop App
            - **macOS Apple Silicon**: Download `.dmg` (aarch64)

            ### CLI
            - **macOS**: `curl -fsSL https://raw.githubusercontent.com/Day1-Doctor/d1-doctor-app/main/scripts/install.sh | sh`
            - Or download `d1-macos-universal.tar.gz` below
          releaseDraft: true
          prerelease: false

      - name: Generate and upload update.json
        if: ${{ github.ref_type == 'tag' || inputs.tag != '' }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}"
          VERSION="${TAG#v}"

          BUNDLE_DIR="${{ env.TAURI_DIR }}/target/${{ matrix.target }}/release/bundle/macos"

          # Read the update bundle signature
          SIG_FILE=$(find "$BUNDLE_DIR" -name "*.app.tar.gz.sig" | head -1)
          if [ -z "$SIG_FILE" ]; then
            echo "::error::No .app.tar.gz.sig file found — is TAURI_SIGNING_PRIVATE_KEY set?"
            exit 1
          fi
          SIGNATURE=$(cat "$SIG_FILE")

          # Determine the .app.tar.gz asset name uploaded by tauri-action
          TAR_FILE=$(find "$BUNDLE_DIR" -name "*.app.tar.gz" ! -name "*.sig" | head -1)
          TAR_BASENAME=$(basename "$TAR_FILE")

          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${TAR_BASENAME}"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "See the changelog for details." \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg sig "$SIGNATURE" \
            --arg url "$DOWNLOAD_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $sig,
                  url: $url
                }
              }
            }' > update.json

          cat update.json
          gh release upload "${TAG}" update.json --clobber

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            ${{ env.TAURI_DIR }}/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            ${{ env.TAURI_DIR }}/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            ${{ env.TAURI_DIR }}/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

  build-cli:
    name: Build CLI (macOS aarch64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build CLI binary
        run: cargo build --release -p d1-doctor-cli --target aarch64-apple-darwin

      - name: Package CLI tarball
        run: |
          mkdir -p dist
          tar -czf dist/d1-macos-universal.tar.gz \
            -C target/aarch64-apple-darwin/release \
            d1-doctor-cli

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-macos-aarch64
          path: dist/d1-macos-universal.tar.gz
          if-no-files-found: error

  attach-cli-to-release:
    name: Attach CLI to GitHub Release
    needs: [build-macos, build-cli]
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    runs-on: ubuntu-latest
    steps:
      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-macos-aarch64

      - name: Upload CLI to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}"
          gh release upload "$TAG" d1-macos-universal.tar.gz --clobber
