# secrets-validation.yml
# GitHub Actions workflow that scans PRs for hardcoded secrets.
# This is a STARTING POINT — copy into your repo's .github/workflows/ and customize.
#
# What it does:
#   1. Scans changed files for private keys, AWS keys, and high-entropy API tokens
#   2. Verifies .gitignore covers common secret file patterns
#   3. Fails the check if secrets are found; warns if .gitignore is incomplete
#
# Cloud: Agnostic (works with any provider)

name: Secrets Validation

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  scan-secrets:
    name: Scan for hardcoded secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          # Get changed files, skip binary and lock files
          FILES=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" | \
            grep -v -E '\.(png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|pdf|zip|tar|gz|lock|min\.js|min\.css)$' | \
            grep -v -E '(package-lock\.json|yarn\.lock|pnpm-lock\.yaml|Gemfile\.lock|poetry\.lock|Cargo\.lock|go\.sum)$' || true)

          if [ -z "$FILES" ]; then
            echo "No scannable files changed."
            echo "files=" >> "$GITHUB_OUTPUT"
          else
            # Write files to output (newline-delimited)
            EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
            echo "files<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
            echo "$FILES" >> "$GITHUB_OUTPUT"
            echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan for secrets in changed files
        if: steps.changed.outputs.files != ''
        run: |
          FOUND=0

          echo "=== Scanning changed files for secrets ==="
          echo ""

          while IFS= read -r file; do
            [ -f "$file" ] || continue

            # --- Private Keys (RSA, EC, DSA, OPENSSH) ---
            if grep -qE '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----' "$file"; then
              echo "::error file=${file}::Private key detected in ${file}"
              FOUND=1
            fi

            # --- AWS Access Key IDs ---
            if grep -qE 'AKIA[0-9A-Z]{16}' "$file"; then
              echo "::error file=${file}::AWS access key (AKIA*) detected in ${file}"
              FOUND=1
            fi

            # --- High-entropy API key patterns ---
            # Matches common formats: key=<long-alphanumeric>, token: <long-alphanumeric>
            # Customize: adjust the minimum length (40) and patterns for your project
            if grep -qiE '(api[_-]?key|api[_-]?secret|auth[_-]?token|access[_-]?token|secret[_-]?key|private[_-]?key)\s*[:=]\s*["\x27]?[A-Za-z0-9/+=_-]{40,}' "$file"; then
              echo "::warning file=${file}::Possible high-entropy API key/token in ${file} — verify this is not a real credential"
              FOUND=1
            fi

            # Customize: add project-specific patterns below
            # Example — GCP service account key:
            # if grep -qE '"type"\s*:\s*"service_account"' "$file"; then
            #   echo "::error file=${file}::GCP service account key detected in ${file}"
            #   FOUND=1
            # fi
            #
            # Example — Stripe secret key:
            # if grep -qE 'sk_live_[0-9a-zA-Z]{24,}' "$file"; then
            #   echo "::error file=${file}::Stripe live secret key detected in ${file}"
            #   FOUND=1
            # fi
            #
            # Example — Slack webhook URL:
            # if grep -qE 'hooks\.slack\.com/services/T[A-Z0-9]+/B[A-Z0-9]+/[a-zA-Z0-9]+' "$file"; then
            #   echo "::error file=${file}::Slack webhook URL detected in ${file}"
            #   FOUND=1
            # fi

          done <<< "${{ steps.changed.outputs.files }}"

          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "::error::Secrets detected in changed files. Remove them and use environment variables or a secrets manager instead."
            exit 1
          else
            echo "No secrets detected in changed files."
          fi

      - name: Verify .gitignore coverage
        run: |
          MISSING=0

          # Required .gitignore patterns for secret files
          REQUIRED_PATTERNS=(
            ".env"
            ".env.*"
            "terraform.tfvars"
            "*.tfstate"
            "*.pem"
            "*.key"
          )

          # Customize: add project-specific patterns that must be in .gitignore
          # REQUIRED_PATTERNS+=(
          #   "credentials.json"
          #   "service-account.json"
          #   "*.p12"
          #   ".gcloud/"
          # )

          if [ ! -f .gitignore ]; then
            echo "::warning::.gitignore file not found — strongly recommended for any project with secrets"
            exit 0
          fi

          echo "=== Checking .gitignore for required patterns ==="
          echo ""

          for pattern in "${REQUIRED_PATTERNS[@]}"; do
            # Check if the pattern (or a broader glob covering it) exists in .gitignore
            if ! grep -qF "$pattern" .gitignore; then
              echo "::warning::.gitignore is missing pattern: ${pattern}"
              MISSING=1
            else
              echo "  OK: ${pattern}"
            fi
          done

          echo ""

          if [ "$MISSING" -eq 1 ]; then
            echo "::warning::Some recommended .gitignore patterns are missing. Consider adding them to prevent accidental secret commits."
          else
            echo "All required .gitignore patterns present."
          fi
