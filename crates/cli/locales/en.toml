# English message catalog for Day1 Doctor CLI

[app]
name = "Day 1 Doctor"
version_line = "Day 1 Doctor CLI v{version}"
usage_hint = "Run `d1-doctor --help` for usage"

[auth]
opening_browser = "Opening browser for authentication..."
waiting_callback = "Waiting for authentication callback on port {port}..."
login_success = "Successfully logged in as {email}"
logout_success = "Logged out successfully."
