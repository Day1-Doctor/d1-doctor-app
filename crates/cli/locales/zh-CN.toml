# Day1 Doctor CLI 中文消息目录

[app]
name = "Day1 Doctor"
version_line = "Day1 Doctor CLI v{version}"
usage_hint = "运行 `d1-doctor --help` 查看用法"

[auth]
opening_browser = "正在打开浏览器进行认证..."
waiting_callback = "正在等待认证回调，端口 {port}..."
login_success = "登录成功：{email}"
logout_success = "已成功退出登录。"
logged_in_as = "当前登录：{email}"
token_expired = "警告：令牌已过期。运行 'd1-doctor auth login' 重新认证。"
not_logged_in = "未登录。运行 'd1-doctor auth login' 进行认证。"
no_credentials = "未找到已保存的凭据。运行 'd1-doctor auth login' 进行认证。"
auth_code_failed = "无法从回调中提取授权码"
token_exchange_failed = "令牌交换失败 ({status}): {body}"

[chat]
welcome_title = "--- Day1 Doctor 对话 ---"
session_label = "会话：{id}"
connected_to = "已连接：{target}"
input_hint = "  输入消息后按 Enter 发送。"
multiline_hint = "  多行模式：以 '{' 开始，以 '}' 结束。"
exit_hint = "  Ctrl+C 取消回复，Ctrl+D 或 /exit 退出。"
paste_mode = "(粘贴模式 -- 在新行输入 '}' 发送)"
thinking = "思考中..."
response_cancelled = "(回复已取消)"
goodbye = "再见！"

[status]
title = "Day1 Doctor v{version}"
daemon_label = "  守护进程：[{status}]  端口 {port}"
cloud_label = "  云服务：  [{status}]  {url}"

[gateway]
title = "网关状态"
health_label = "  健康状态：{health}"
endpoint_label = "  端点：    {endpoint}"
models_label = "  模型：    {count} 个可用"
health_healthy = "正常"
health_degraded = "降级"
health_offline = "离线"

[gateway.table]
model = "模型"
provider = "提供商"
input_price = "输入/1K"
output_price = "输出/1K"
context = "上下文"
offline_suffix = "（离线）"

[gateway.keys]
col_id = "ID"
col_name = "名称"
col_prefix = "前缀"
col_status = "状态"
col_created = "创建时间"
active = "活跃"
revoked_label = "已撤销"
none = "未找到 API 密钥。"
create_hint = "使用以下命令创建：d1 gateway keys create --name \"My Key\""
list_failed = "获取 API 密钥列表失败 ({status}): {body}"
create_failed = "创建 API 密钥失败 ({status}): {body}"
created_title = "API 密钥已创建：{name}"
created_warning = "请立即保存此密钥——之后将无法再次显示。"
revoked = "API 密钥 {id} 已撤销。"
not_found = "未找到 API 密钥 {id}。"
revoke_failed = "撤销 API 密钥失败 ({status}): {body}"

[gateway.balance]
title = "DD 积分余额"
dd_balance = "  DD 余额：{amount} DD"
fetch_failed = "获取余额失败 ({status}): {body}"

[gateway.topup]
opening = "正在打开充值页面：{url}"
hint = "您也可以在网页控制台管理余额。"

[gateway.usage]
title = "使用统计（最近 {days} 天）"
total_requests = "  请求数：{count}"
total_dd = "  DD 消耗：{amount} DD"
fetch_failed = "获取使用统计失败 ({status}): {body}"
col_date = "日期"
col_model = "模型"
col_input = "输入令牌"
col_output = "输出令牌"
col_dd = "DD"

[gateway.models_info]
title = "模型：{alias}"
not_found = "未找到模型 '{alias}'。运行 'd1 gateway models' 查看可用模型。"

[gateway.setup]
configuring = "正在配置 {app} 使用 Day1 Doctor 网关..."
existing_key = "找到现有密钥：{prefix}..."
key_created = "已创建 API 密钥 '{name}' ({prefix}...)"
wrote_config = "配置已写入：{path}"
done = "配置完成！请重启应用以生效。"
unsupported_app = "不支持的应用：{app}。支持的应用：cursor、continue、openclaw、--generic"
generic_instructions = "请将以下内容添加到您的应用的 OpenAI 兼容配置中："
generic_env_hint = "或设置以下环境变量："

[credits]
title = "积分余额"
plan_label = "  套餐：    {plan}"
available_label = "  可用：    ${amount}"
used_label = "  本月用量：${amount}"
no_usage = "  暂无使用记录。"
date_col = "日期"
model_col = "模型"
tokens_col = "令牌数"
cost_col = "费用"

[commands]
installing = "正在安装 {package}..."

[errors]
connection_failed = "连接失败：{url}"
not_connected = "未连接"
agent_error = "代理错误：{message}"
response_cancelled = "回复已取消"
home_dir_error = "无法确定主目录"
